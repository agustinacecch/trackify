<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<title>Ingresos - Trackify</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="navbar">
    <div class="logo">💰 Trackify</div>
    <div class="user">Hola, Usuario</div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
    <nav>
        <a href="index.html">Dashboard</a>
        <a class="active">Ingresos</a>
        <a href="gastos.html">Gastos</a>
        <a href="categorias.html">Categorías</a>
        <a href="objetivos.html">Objetivos</a>
        <a href="perfil.html">Perfil</a>
    </nav>
</aside>

<!-- CONTENIDO -->
<main class="content">

<h2>💸 Ingresos</h2>

<!-- RESUMEN -->
<section class="cards">
    <div class="card ingreso-card">
        <h4>Total del mes</h4>
        <p>$120.000</p>
    </div>
    <div class="card">
        <h4>Cantidad</h4>
        <p>8</p>
    </div>
    <div class="card">
        <h4>Promedio</h4>
        <p>$15.000</p>
    </div>
</section>

<!-- ACCIONES -->
<div class="acciones">
    <button class="btn ingreso">+ Nuevo ingreso</button>
</div>

<!-- FILTROS -->
<section class="filtros">
    <input type="date">
    <select>
        <option>Todos</option>
        <option>Sueldo</option>
        <option>Freelance</option>
        <option>Inversiones</option>
    </select>
</section>

<!-- TABLA -->
<section class="tabla-box">
    <table class="tabla">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Descripción</th>
                <th>Categoría</th>
                <th>Monto</th>
                <th></th>
            </tr>
        </thead>

        <tbody id="tablaIngresos">
            <tr>
                <td>15/03</td>
                <td>Sueldo</td>
                <td>Trabajo</td>
                <td class="positivo">+$80.000</td>
                <td>
                    <button class="edit">✏️</button>
                    <button class="delete">🗑️</button>
                </td>
            </tr>

            <tr>
                <td>10/03</td>
                <td>Diseño web</td>
                <td>Freelance</td>
                <td class="positivo">+$40.000</td>
                <td>
                    <button class="edit">✏️</button>
                    <button class="delete">🗑️</button>
                </td>
            </tr>
        </tbody>
    </table>
</section>

</main>
</div>

</body>
</html>
